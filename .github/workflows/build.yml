name: "Build APK"

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "版本号（如 1.0.1）"
        required: true
        default: "1.0.1"
      version_code:
        description: "版本数字（如 2）"
        required: true
        default: "1"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Build release APK
        working-directory: android
        run: gradle assembleRelease -PversionName="${{ github.event.inputs.version_name }}" -PversionCode="${{ github.event.inputs.version_code }}"

      - name: Rename APK
        working-directory: android/app/build/outputs/apk/release
        run: mv app-release.apk hurun-v${{ github.event.inputs.version_name }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hurun-v${{ github.event.inputs.version_name }}
          path: android/app/build/outputs/apk/release/hurun-v${{ github.event.inputs.version_name }}.apk
