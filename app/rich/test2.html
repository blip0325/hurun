<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>CSV 数据展示</title>
    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <!-- DataTables Bootstrap 5 CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <!-- DataTables 扩展 CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.2/css/buttons.bootstrap5.min.css">
    <style>
        /* 省略号样式 */
        .truncate {
            max-width: 250px;
            /* 固定宽度，可根据需要调整 */
            white-space: nowrap;
            /* 不换行 */
            overflow: hidden;
            /* 超出隐藏 */
            text-overflow: ellipsis;
            /* 显示省略号 */
            display: inline-block;
            /* 保证生效 */
            vertical-align: middle;
        }
    </style>
</head>

<body class="container mt-4">    
    <!-- 年份选择过滤框 -->
    <div class="mb-3">        
        <select id="yearFilter" class="form-select" style="width:auto;display:inline-block;">
            <option value="">全部年份</option>
        </select>
    </div>

    <table id="csvTable" class="table table-striped table-bordered" style="width:100%">
        <thead>
            <tr id="tableHead"></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
    <div id="loadStatus" class="mt-3 text-success fw-bold"></div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <!-- PapaParse -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <!-- DataTables 扩展 JS -->
    <script src="https://cdn.datatables.net/buttons/2.4.2/js/dataTables.buttons.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.bootstrap5.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.html5.min.js"></script>    

    <script>
        const endyear=2025;
        // 生成年份选项
        const yearSelect = document.getElementById("yearFilter");
        for (let year = endyear; year >= 1999; year--) {
            const opt = document.createElement("option");
            opt.value = year;
            opt.textContent = year + "年";
            yearSelect.appendChild(opt);
        }
        const files = [];
        for (let year = 1999; year <= endyear; year++) {
            files.push(`data/data_${year}.csv`);
        }

        let table;
        let headersSet = false;

        function loadCSV(file, isLast = false) {
            Papa.parse(file, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function (results) {
                    const data = results.data;
                    const headers = results.meta.fields;

                    if (!headersSet) {
                        const headRow = document.getElementById("tableHead");
                        headRow.innerHTML = "";
                        headers.forEach(h => {
                            const th = document.createElement("th");
                            th.textContent = h;
                            headRow.appendChild(th);
                        });
                        const thIndustry = document.createElement("th");
                        thIndustry.textContent = "行业";
                        headRow.appendChild(thIndustry);
                        headersSet = true;

                        table = $("#csvTable").DataTable({
                            pageLength: 1000,
                            lengthMenu: [20, 50, 100, 200, 500, 1000],
                            responsive: false,
                            dom: 'lftripB',
                            buttons: ['copy', 'csv'],
                            colReorder: true,
                            deferRender: true,
                            scrollY: "700px",       // 表格内部滚动
                            scrollCollapse: true,
                            paging: true,
                            columnDefs: [                               
                                {
                                    targets: "_all",
                                    render: function (data, type, row) {
                                        if (type === 'display' && data) {
                                            return '<span class="truncate" title="' + data + '">' + data + '</span>';
                                        }
                                        return data;
                                    }
                                }
                            ]
                        });
                        //绑定search框去除前后空格
                        $('#csvTable_filter input').on('keyup', function (e) {
                            this.value = $.trim(this.value);
                            var value = $.trim(this.value); // 去掉前后空格
                            table.search(value).draw();
                        });
                        // 绑定年份过滤事件
                        $("#yearFilter").on("change", function () {
                            const val = $(this).val();
                            if (val) {
                                table.column(headers.indexOf("年份")).search("^" + val + "$", true, false).draw();
                            } else {
                                table.column(headers.indexOf("年份")).search("").draw();
                            }
                        });
                    }

                    data.forEach(row => {
                        const rowData = [];
                        headers.forEach(h => {
                            let value = row[h];
                            if (h === "企业信息" && value) {
                                const parts = value.split("行业：");
                                if (parts.length === 2) {
                                    value = parts[0].trim();
                                }
                            }
                            rowData.push(value);
                        });

                        let industry = "";
                        if (row["企业信息"]) {
                            const parts = row["企业信息"].split("行业：");
                            if (parts.length === 2) {
                                industry = parts[1].trim();
                            }
                        }
                        rowData.push(industry);

                        table.row.add(rowData);
                    });

                    table.draw(false);

                    if (isLast) {
                        document.getElementById("loadStatus").textContent = "✅ 所有数据已加载完成，可以查询全部数据";
                    }
                }
            });
        }

        (async function () {
            for (let i = 0; i < files.length; i++) {
                await new Promise(resolve => {
                    loadCSV(files[i], i === files.length - 1);
                    setTimeout(resolve, 300);
                });
            }
        })();
    </script>
</body>

</html>
