<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>胡润百富榜</title>
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)">

    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="../lib/bootstrap.min.css">
    <link rel="stylesheet" href="../lib/bootstrap-icons.css">
    <link rel="stylesheet" href="../lib/style.css">
    <style>        
    </style>
</head>

<body>
    <div id="app">
        <div class="app-container">
            <!-- 头部 -->
            <div class="app-header">
                <div class="title-area">
                    <h1 class="app-title">🏆 胡润百富榜</h1>
                    <a class="app-ad-link" href="#" @click.prevent="openAd" title="打开 the404.cn">🎰 百家乐模拟</a>
                </div>
                <div class="controls-group">
                    <!-- 年份过滤 -->
                    <select-dropdown
                        v-model="yearFilter"
                        :options="yearOptions"
                        placeholder="全部年份"
                    ></select-dropdown>

                    <!-- 搜索框 -->
                    <div class="search-wrapper">
                        <input
                            type="text"
                            v-model="searchQuery"
                            @keyup.enter="executeSearch"
                            placeholder="输入关键词搜索..."
                        />
                        <button class="btn-search" @click="executeSearch" title="搜索">
                            <i class="bi bi-search"></i>
                        </button>
                        <button class="btn-clear" @click="clearSearch" title="清除搜索">
                            <i class="bi bi-x-circle"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 工具栏 -->
            <div class="toolbar">
                <!-- 列可见性 -->
                <select-dropdown placeholder="列显示">
                    <li class="sd-label-wrap" v-for="h in headers" :key="h">
                        <label class="sd-check-label" @click.stop>
                            <input type="checkbox" v-model="visibleColumns[h]" @change="onColvisChange" />
                            {{ h }}
                        </label>
                    </li>
                </select-dropdown>


                <button class="toolbar-btn" @click="exportCSV">
                    <i class="bi bi-download"></i> 导出CSV
                </button>
            </div>

            <!-- 分页 -->
            <pagination-bar
                v-if="totalPages > 0"
                :current-page="currentPage"
                :total-pages="totalPages"
                :total-records="filteredData.length"
                :page-size="pageSize"
                :page-sizes="pageSizes"
                @update:page-size="onPageSizeUpdate"
                @page-change="goToPage"
            ></pagination-bar>

            <!-- 表格 -->
            <div class="table-container">
                <div class="table-scroll" ref="tableScroll">
                    <table>
                        <thead>
                            <tr>
                                <th
                                    v-for="h in headers"
                                    :key="h"
                                    v-show="visibleColumns[h]"
                                    @click="setSort(h)"
                                    :class="{ sorted: sortKey === h }"
                                >
                                    {{ h }}
                                    <span class="sort-icon">
                                        {{ sortKey === h ? (sortOrder === 'asc' ? '▲' : '▼') : '⇅' }}
                                    </span>
                                </th>
                            </tr>
                        </thead>
                        <tbody @click="handleCellClick">
                            <tr v-if="paginatedData.length === 0">
                                <td :colspan="visibleHeaderCount" class="text-center text-muted py-5">
                                    <i class="bi bi-inbox" style="font-size:32px;display:block;opacity:0.3;"></i>
                                    没有匹配的数据
                                </td>
                            </tr>
                            <tr v-for="(row, idx) in paginatedData" :key="idx">
                                <td
                                    v-for="h in headers"
                                    :key="h"
                                    v-show="visibleColumns[h]"
                                    v-html="formatCell(h, row)"
                                ></td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- 底部分页 -->
                <pagination-bar
                    v-if="totalPages > 0"
                    :current-page="currentPage"
                    :total-pages="totalPages"
                    :total-records="filteredData.length"
                    :page-size="pageSize"
                    :page-sizes="pageSizes"
                    @update:page-size="onPageSizeUpdate"
                    @page-change="goToPage"
                ></pagination-bar>

            </div>
        </div>

        <!-- 底部导航 -->
        <bottom-nav active="百富榜" top500-path="../top500/500data.html"></bottom-nav>
    </div>

    <!-- Vue 3 + PapaParse -->
    <script src="../lib/vue.global.prod.js"></script>
    <script src="../lib/papaparse.min.js"></script>
    <script src="../lib/indexdbhelper.js"></script>
    <script src="../lib/hcsearch.js"></script>
    <script src="../lib/storageHelper.js"></script>
    <!-- 下拉选择组件 -->
    <script src="../components/SelectDropdown.js"></script>
    <!-- 底部导航组件 -->
    <script src="../components/BottomNav.js"></script>
    <!-- 分页组件 -->
    <script src="../components/Pagination.js"></script>

    <script>
        const { createApp, ref, computed, watch, onMounted, onUnmounted, nextTick } = Vue;

        const app = createApp({
            setup() {
                // ===== 常量 =====
                const START_YEAR = 1999;
                const END_YEAR = 2025;
                const HEADERS = ['年份', '排名', '财富', '排名变化', '个人信息', '年龄', '企业信息', '行业'];
                const PAGE_SIZES = [10, 20, 50, 100, 200, 500, 1000];

                // ===== 响应式状态 =====
                const allData = ref([]);
                const loading = ref(false);
                const loadDone = ref(false);
                const currentPage = ref(1);
                const pageSize = ref(50);
                const sortKey = ref('年份');
                const sortOrder = ref('desc');
                const searchQuery = ref('');
                const yearFilter = ref('');
                const isMobile = ref(window.innerWidth <= 600);
                const savedColvis = StorageHelper.get('colvis_rich', null);
                const visibleColumns = ref(
                    savedColvis || Object.fromEntries(HEADERS.map(h => [h, true]))
                );
                const tableScroll = ref(null);

                // ===== 计算属性 =====
                const years = computed(() => {
                    const arr = [];
                    for (let y = END_YEAR; y >= START_YEAR; y--) arr.push(y);
                    return arr;
                });

                const yearOptions = computed(() => [
                    { label: '全部年份', value: '' },
                    ...years.value.map(y => ({ label: y + '年', value: String(y) }))
                ]);
                const headers = computed(() => HEADERS);

                const visibleHeaderCount = computed(() =>
                    HEADERS.filter(h => visibleColumns.value[h]).length
                );

                const pageSizes = computed(() => PAGE_SIZES);

                // 按年份过滤
                const filteredByYear = computed(() => {
                    if (!yearFilter.value) return allData.value;
                    return allData.value.filter(row => String(row['年份']) === String(yearFilter.value));
                });

                // 按搜索词过滤
                const filteredData = computed(() => {
                    let data = filteredByYear.value;
                    const q = searchQuery.value.trim().toLowerCase();
                    if (!q) return data;
                    return data.filter(row =>
                        HEADERS.some(h => {
                            const val = row[h];
                            return val && String(val).toLowerCase().includes(q);
                        })
                    );
                });

                // 排序
                const sortedData = computed(() => {
                    const data = [...filteredData.value];
                    const key = sortKey.value;
                    const order = sortOrder.value;

                    data.sort((a, b) => {
                        let va = getSortValue(key, a[key]);
                        let vb = getSortValue(key, b[key]);

                        if (va === vb) return 0;
                        const cmp = va < vb ? -1 : 1;
                        return order === 'asc' ? cmp : -cmp;
                    });
                    return data;
                });

                // 分页
                const paginatedData = computed(() => {
                    const start = (currentPage.value - 1) * pageSize.value;
                    return sortedData.value.slice(start, start + pageSize.value);
                });

                const totalPages = computed(() =>
                    Math.max(1, Math.ceil(filteredData.value.length / pageSize.value))
                );

                // 分页按钮
                const pageButtons = computed(() => {
                    const total = totalPages.value;
                    const current = currentPage.value;
                    const pages = [];

                    if (total <= 4) {
                        for (let i = 1; i <= total; i++) pages.push(i);
                    } else {
                        pages.push(1);
                        if (current > 2) pages.push('...');
                        const start = Math.max(2, current);
                        const end = Math.min(total - 1, current);
                        for (let i = start; i <= end; i++) pages.push(i);
                        if (current < total - 1) pages.push('...');
                        pages.push(total);
                    }
                    return pages;
                });

                // ===== 辅助函数 =====

                // 提取排序用值
                function getSortValue(key, rawValue) {
                    if (!rawValue && rawValue !== 0) return 0;
                    const val = String(rawValue);
                    if (key === '排名' || key === '排名变化' || key === '年份' || key === '年龄') {
                        return parseFloat(val.replace(/[^0-9.\-]/g, '')) || 0;
                    }
                    if (key === '财富') {
                        const num = val.replace(/[￥,\s亿千万]/g, '').trim();
                        return parseFloat(num) || 0;
                    }
                    return val.toLowerCase();
                }

                // 格式化单元格（处理链接化）
                function formatCell(key, row) {
                    const rawValue = row[key];
                    if (!rawValue && rawValue !== 0) return '<span class="text-muted">-</span>';
                    const value = String(rawValue);

                    if (key === '个人信息') {
                        const match = value.match(/(.+?)(先生|女士|未知)(.*)/);
                        if (match) {
                            const namePart = match[1].trim();
                            const suffix = match[2] + match[3];
                            if (isMobile.value) {
                                // 移动端只显示名字
                                return `<a class="cell-link" data-search="${escHtml(namePart)}" title="${escHtml(namePart)}">${escHtml(namePart)}</a>`;
                            }
                            return `<a class="cell-link" data-search="${escHtml(namePart)}" title="${escHtml(namePart)}">${escHtml(namePart)}</a>${escHtml(suffix)}`;
                        }
                        return `<a class="cell-link" data-search="${escHtml(value)}" title="${escHtml(value)}">${escHtml(value)}</a>`;
                    }

                    if (key === '企业信息') {
                        const stopIdx = Math.min(
                            value.indexOf('集团') > -1 ? value.indexOf('集团') : Infinity,
                            value.indexOf('公司') > -1 ? value.indexOf('公司') : Infinity
                        );
                        if (stopIdx < Infinity) {
                            const namePart = value.substring(0, stopIdx).trim();
                            const suffix = value.substring(stopIdx);
                            return `<a class="cell-link" data-search="${escHtml(namePart)}" title="${escHtml(namePart)}">${escHtml(namePart)}</a>${escHtml(suffix)}`;
                        }
                        return `<a class="cell-link" data-search="${escHtml(value)}" title="${escHtml(value)}">${escHtml(value)}</a>`;
                    }

                    if (key === '行业') {
                        const parts = value.split(/(和|、)/);
                        return parts.map(part => {
                            if (part === '和' || part === '、') return escHtml(part);
                            if (part.trim().length > 0) {
                                const t = part.trim();
                                return `<a class="cell-link" data-search="${escHtml(t)}" title="${escHtml(t)}">${escHtml(t)}</a>`;
                            }
                            return '';
                        }).join('');
                    }

                    return escHtml(value);
                }

                function escHtml(str) {
                    const div = document.createElement('div');
                    div.textContent = str;
                    return div.innerHTML;
                }

                // ===== 数据预处理 =====

                // 从原始行中提取"年龄"和"行业"，并清理"企业信息"
                function preprocessRow(row) {
                    const processed = { ...row };

                    // 从个人信息中提取年龄
                    if (processed['个人信息']) {
                        const info = String(processed['个人信息']);
                        const match = info.match(/(.+?)(先生|女士|未知)(.*)/);
                        if (match) {
                            const rest = match[3];
                            const numbers = rest.match(/\d+/);
                            processed['年龄'] = numbers ? numbers[0] : '';
                        } else {
                            processed['年龄'] = '';
                        }
                    } else {
                        processed['年龄'] = '';
                    }

                    // 从企业信息中提取行业，并清理企业信息
                    if (processed['企业信息']) {
                        const info = String(processed['企业信息']);
                        const idx = info.indexOf('行业：');
                        if (idx > -1) {
                            processed['行业'] = info.substring(idx + 3).trim();
                            // 企业信息去掉行业部分（但保留换行清理）
                            processed['企业信息'] = info.substring(0, idx).trim();
                        } else {
                            processed['行业'] = '';
                        }
                    } else {
                        processed['行业'] = '';
                    }

                    return processed;
                }

                // ===== 方法 =====

                function setSort(key) {
                    if (sortKey.value === key) {
                        sortOrder.value = sortOrder.value === 'asc' ? 'desc' : 'asc';
                    } else {
                        sortKey.value = key;
                        sortOrder.value = 'desc';
                    }
                    currentPage.value = 1;
                }

                function goToPage(page) {
                    if (page !== currentPage.value) {
                        currentPage.value = page;
                        scrollToTop();
                    }
                }

                function onPageSizeUpdate(newSize) {
                    pageSize.value = newSize;
                    currentPage.value = 1;
                    scrollToTop();
                }

                function onYearChange() {
                    currentPage.value = 1;
                }

                // 年份变化时自动重置页码
                watch(yearFilter, () => {
                    onYearChange();
                });

                function openAd() {
                    const url = 'http://the404.cn';
                    if (typeof NativeBridge !== 'undefined' && NativeBridge.isAndroid) {
                        Android.openExternalUrl(url);
                    } else {
                        window.open(url, '_blank');
                    }
                }

                function onColvisChange() {
                    const anyVisible = HEADERS.some(h => visibleColumns.value[h]);
                    if (!anyVisible) {
                        visibleColumns.value[HEADERS[0]] = true;
                    }
                    StorageHelper.set('colvis_rich', visibleColumns.value);
                }

                function executeSearch() {
                    const q = searchQuery.value.trim();
                    if (q) {
                        updateURL(q);
                    }
                    currentPage.value = 1;
                }

                function clearSearch() {
                    searchQuery.value = '';
                    updateURL('');
                    currentPage.value = 1;
                }

                function updateURL(keyword) {
                    const url = new URL(window.location);
                    if (keyword) {
                        url.searchParams.set('search', keyword);
                    } else {
                        url.searchParams.delete('search');
                    }
                    const currentSearch = new URL(window.location).searchParams.get('search');
                    if (currentSearch !== keyword) {
                        window.history.pushState({ search: keyword }, '', url);
                    }
                    document.title = keyword ? `胡润百富榜 - 搜索: ${keyword}` : '胡润百富榜';
                }

                function handleCellClick(e) {
                    const link = e.target.closest('.cell-link');
                    if (link && link.dataset.search) {
                        e.preventDefault();
                        const keyword = link.dataset.search;
                        searchQuery.value = keyword;
                        updateURL(keyword);
                        currentPage.value = 1;
                    }
                }

                function scrollToTop() {
                    nextTick(() => {
                        if (tableScroll.value) {
                            tableScroll.value.scrollTop = 0;
                        }
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    });
                }

                // 导出CSV
                function exportCSV() {
                    const data = filteredData.value;
                    if (data.length === 0) return;

                    const visibleHeaders = HEADERS.filter(h => visibleColumns.value[h]);
                    let csv = '\uFEFF' + visibleHeaders.join(',') + '\n';
                    data.forEach(row => {
                        csv += visibleHeaders.map(h => {
                            let val = stripHtml(String(row[h] || ''));
                            if (val.includes(',') || val.includes('"') || val.includes('\n')) {
                                val = '"' + val.replace(/"/g, '""') + '"';
                            }
                            return val;
                        }).join(',') + '\n';
                    });

                    const filename = '胡润百富榜_export.csv';

                    // Android WebView: 使用原生保存到下载目录
                    if (window.NativeBridge && window.NativeBridge.isAndroid) {
                        window.NativeBridge.saveCsvToDownloads(csv, filename);
                        return;
                    }

                    // 浏览器: Web Share API 或下载链接
                    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                    const file = new File([blob], filename, { type: 'text/csv;charset=utf-8;' });
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        navigator.share({ files: [file] }).catch(() => {
                            downloadFallback(blob, filename);
                        });
                    } else {
                        downloadFallback(blob, filename);
                    }
                }

                function downloadFallback(blob, filename) {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    setTimeout(() => URL.revokeObjectURL(url), 1000);
                }

                function stripHtml(html) {
                    const div = document.createElement('div');
                    div.innerHTML = html;
                    return div.textContent || '';
                }

                // CSV 解析
                function parseCSVFile(url) {
                    return new Promise((resolve, reject) => {
                        Papa.parse(url, {
                            download: true,
                            header: true,
                            skipEmptyLines: true,
                            complete: (results) => resolve(results.data),
                            error: (err) => reject(err)
                        });
                    });
                }

                async function loadAllData() {
                    const DB_NAME = 'HurunDB';
                    const DB_VERSION = 3;
                    const STORE_NAME = 'rich';
                    const STORE_CONFIG = [
                        { name: 'rich', keyPath: 'id' },
                        { name: 'top500', keyPath: 'id' }
                    ];
                    const DATA_KEY = 'data';

                    // 尝试从 IndexedDB 读取缓存
                    let cached = null;
                    try {
                        console.log('[IDB] 尝试读取缓存', DB_NAME, STORE_NAME, DATA_KEY);
                        const row = await IndexedDBHelper.get(DB_NAME, STORE_NAME, DATA_KEY, DB_VERSION, STORE_CONFIG);
                        console.log('[IDB] 读取结果:', row);
                        if (row) cached = row.value;
                    } catch (e) {
                        console.warn('[IDB] 读取失败，回退到 CSV:', e);
                    }

                    if (cached && cached.length > 0) {
                        console.log('[IDB] ✅ 命中缓存，共', cached.length, '条');
                        allData.value = cached;
                        loading.value = false;
                        loadDone.value = true;
                    } else {
                        console.log('[IDB] 缓存未命中，从 CSV 加载');
                        // 从 CSV 加载
                        const fileList = [];
                        for (let y = END_YEAR; y >= START_YEAR; y--) {
                            fileList.push(`data/data_${y}.csv`);
                        }

                        for (let i = 0; i < fileList.length; i++) {
                            try {
                                const rows = await parseCSVFile(fileList[i]);
                                allData.value = [...allData.value, ...rows.map(preprocessRow)];
                                // 每读完一个文件就写入缓存（转为纯对象以兼容 IndexedDB structuredClone）
                                try {
                                    const plainData = JSON.parse(JSON.stringify(allData.value));
                                    await IndexedDBHelper.put(DB_NAME, STORE_NAME, { id: DATA_KEY, value: plainData }, DB_VERSION, STORE_CONFIG);
                                    console.log('[IDB] 写入进度:', i + 1, '/', fileList.length, '共', allData.value.length, '条');
                                } catch (e) {
                                    console.warn('[IDB] 写入失败:', fileList[i], e);
                                }
                            } catch (e) {
                                console.error('加载失败:', fileList[i], e);
                            }
                            await new Promise(r => setTimeout(r, 50));
                        }

                        console.log('[IDB] CSV 加载完成，共', allData.value.length, '条');
                        loading.value = false;
                        loadDone.value = true;
                    }

                    // 检查URL参数
                    const urlParams = new URLSearchParams(window.location.search);
                    const searchParam = urlParams.get('search');
                    if (searchParam) {
                        searchQuery.value = searchParam;
                        document.title = `胡润百富榜 - 搜索: ${searchParam}`;
                    }
                }

                // ===== 监听器 =====
                watch(searchQuery, () => {
                    currentPage.value = 1;
                });

                // 浏览器前进后退
                const onPopState = (e) => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const kw = urlParams.get('search');
                    if (kw) {
                        searchQuery.value = kw;
                        document.title = `胡润百富榜 - 搜索: ${kw}`;
                    } else {
                        searchQuery.value = '';
                        document.title = '胡润百富榜';
                    }
                };

                // 窗口大小变化
                const onResize = () => {
                    isMobile.value = window.innerWidth <= 600;
                };

                // ===== 生命周期 =====
                onMounted(async () => {
                    window.addEventListener('popstate', onPopState);
                    window.addEventListener('resize', onResize);
                    await loadAllData();
                });

                onUnmounted(() => {
                    window.removeEventListener('popstate', onPopState);
                    window.removeEventListener('resize', onResize);
                });

                // ===== 返回 =====
                return {
                    // state
                    allData, loadDone,
                    currentPage, pageSize, sortKey, sortOrder,
                    searchQuery, yearFilter,
                    visibleColumns,
                    tableScroll, isMobile,
                    // computed
                    years, yearOptions, headers, visibleHeaderCount, pageSizes,
                    filteredData, sortedData, paginatedData,
                    totalPages,
                    // methods
                    setSort, goToPage, onPageSizeUpdate,
                    onYearChange, openAd, onColvisChange,
                    executeSearch, clearSearch, formatCell,
                    handleCellClick, exportCSV
                };
            }
        });

        // 注册底部导航组件
        app.component('bottom-nav', BottomNav);
        // 注册分页组件
        app.component('pagination-bar', PaginationBar);
        // 注册下拉选择组件
        app.component('select-dropdown', SelectDropdown);
        app.mount('#app');
    </script>

    <!-- Android WebView 桥接 -->
    <script>
        (function() {
            var isAndroidWebView = typeof Android !== 'undefined' &&
                                   typeof Android.isDarkMode === 'function';
            if (isAndroidWebView) {
                document.body.classList.add('android-webview');
            }

            window.NativeBridge = {
                isAndroid: isAndroidWebView,
                goBack: function() {
                    if (isAndroidWebView && typeof Android.goBack === 'function') {
                        Android.goBack();
                    }
                },
                isDarkMode: function() {
                    if (isAndroidWebView && typeof Android.isDarkMode === 'function') {
                        return Android.isDarkMode();
                    }
                    return window.matchMedia('(prefers-color-scheme: dark)').matches;
                },
                showToast: function(msg) {
                    if (isAndroidWebView && typeof Android.showToast === 'function') {
                        Android.showToast(msg);
                    }
                },
                saveCsvToDownloads: function(csvData, filename) {
                    if (isAndroidWebView && typeof Android.saveCsvToDownloads === 'function') {
                        Android.saveCsvToDownloads(csvData, filename);
                    }
                }
            };

            var darkQuery = window.matchMedia('(prefers-color-scheme: dark)');
            function updateTheme() {
                document.documentElement.setAttribute(
                    'data-theme',
                    darkQuery.matches ? 'dark' : 'light'
                );
            }
            darkQuery.addEventListener('change', updateTheme);
            updateTheme();
        })();
    </script>
</body>

</html>
