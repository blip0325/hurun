<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <title>CSV 数据展示</title>
  <!-- Bootstrap 5 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <!-- DataTables Bootstrap 5 CSS -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
  <!-- DataTables 扩展 CSS -->
  <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.2/css/buttons.bootstrap5.min.css">
</head>

<body class="container mt-4">
  <h2 class="mb-4">CSV 数据表格</h2>
  <table id="csvTable" class="table table-striped table-bordered" style="width:100%">
    <thead>
      <tr id="tableHead"></tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <!-- PapaParse -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- DataTables JS -->
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
  <!-- DataTables 扩展 JS -->
  <script src="https://cdn.datatables.net/buttons/2.4.2/js/dataTables.buttons.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.bootstrap5.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.html5.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.print.min.js"></script>

  <script>
    Papa.parse("data.csv", {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function (results) {
        const data = results.data;
        const headers = results.meta.fields;

        // 构建表头：原有列 + 行业
        const headRow = document.getElementById("tableHead");
        headRow.innerHTML = "";
        headers.forEach(h => {
          const th = document.createElement("th");
          th.textContent = h;
          headRow.appendChild(th);
        });
        const thIndustry = document.createElement("th");
        thIndustry.textContent = "行业";
        headRow.appendChild(thIndustry);

        // 构建表体
        const body = document.getElementById("tableBody");
        body.innerHTML = "";
        data.forEach(row => {
          const tr = document.createElement("tr");

          headers.forEach(h => {
            const td = document.createElement("td");
            let value = row[h];

            // 针对“企业信息”列，截掉行业部分
            if (h === "企业信息" && value) {
              const parts = value.split("行业：");
              if (parts.length === 2) {
                value = parts[0].trim(); // 企业名称
              }
            }

            td.textContent = value;
            tr.appendChild(td);
          });

          // 从“企业信息”列提取行业信息
          let industry = "";
          if (row["企业信息"]) {
            const parts = row["企业信息"].split("行业：");
            if (parts.length === 2) {
              industry = parts[1].trim();
            }
          }
          const tdIndustry = document.createElement("td");
          tdIndustry.textContent = industry;
          tr.appendChild(tdIndustry);

          body.appendChild(tr);
        });

        // 初始化 DataTable
        $("#csvTable").DataTable({
          pageLength: 50,
          lengthMenu: [10, 25, 50, 100],
          responsive: false, // 禁用自动折叠
          dom: 'Blfrtip',
          buttons: ['copy', 'csv', 'excel', 'pdf', 'print'],
          colReorder: true,
          deferRender: true,
          columnDefs: [
            { targets: -1, width: "200px" } // 固定行业列宽度
          ]
        });
      }
    });
  </script>
</body>

</html>
